<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>yo. 💗</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<!-- custom cursor -->
<div id="cursor">🎀</div>


<!-- sparkles -->
<div id="sparkles"></div>


<!-- doodles -->
<div class="doodles">
    <span>♡</span>
    <span>✦</span>
    <span>☁</span>
    <span>✎</span>
    <span>🌸</span>
</div>



<!-- SCRAPBOOK WORLD -->

<section id="scrapbook">

    <h1>yo.</h1>

    <p>
        you found something 👀
    </p>


    <button id="dabButton">
        dab me up 🤝
    </button>


    <div class="energyBox">
        <div id="energyBar"></div>
    </div>


</section>




<!-- FLOWER GARDEN WORLD -->

<section id="garden">


    <div class="flowers">
        🌷 🌸 🌼 🌹 🌻
    </div>


    <h1>
        secret garden unlocked 🌿
    </h1>


    <p>
        a tiny surprise is waiting...
    </p>



    <!-- vintage envelope -->

    <div id="envelope">


        <div class="seal">
            💗
        </div>


        <div class="flap"></div>


        <div class="paper-inside">
            💌
        </div>


    </div>


</section>





<!-- LETTER WORLD -->

<section id="letter">


<div class="old-paper">


<h2>
hey, lil teddy bear 🧸💚
</h2>


<div id="typing"></div>


<!-- fake phone keyboard -->

<div id="keyboard">


<div>
q w e r t y u i o p
</div>

<div>
a s d f g h j k l
</div>

<div>
z x c v b n m
</div>


</div>



<button id="closeLetter">
close 💗
</button>



</div>


</section>





<!-- FINAL GARDEN ENDING -->

<section id="ending">


<div class="bouquet">
🌷🌸🌹🌻🌼
</div>


<div class="teddy">
🧸
</div>


<div id="arrow">
🏹
</div>


<div id="hearts"></div>



<h1>
surprise complete 💗
</h1>


</section>



<audio id="music" loop>

<source src="music/melody.mp3" type="audio/mpeg">

</audio>



<script src="script.js"></script>


</body>

</html>
